# Dockerman Deadline System
version: "3.8"

services:
  deadlines:
    build: .
    container_name: Dockerman-deadlines
    ports:
      - "9991:9999"
    volumes:
      - deadlines-data:/app/data
    environment:
      - PORT=9999
      - DATA_DIR=/app/data
    restart: unless-stopped

volumes:
  deadlines-data:
    driver: local